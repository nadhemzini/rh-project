<div class="container mt-5 mb-5">
  <h2 class="text-center text-primary mb-5 fw-bold">Gestion des Émissions</h2>

  <!-- 🔍 BARRE DE RECHERCHE -->
  <div class="card mb-5 shadow-sm rounded-4 border-0">
    <div class="card-body">
      <h5 class="card-title mb-4 fw-semibold">Recherche avancée</h5>
      <div class="row g-4">
        <div class="col-md-3">
          <label class="form-label fw-semibold">Matricule</label>
          <input type="text" [(ngModel)]="searchMatricule" class="form-control rounded-pill border-primary" placeholder="Entrer le matricule" />
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Zone</label>
          <input type="text" [(ngModel)]="searchZone" class="form-control rounded-pill border-primary" placeholder="Entrer la zone" />
        </div>
         <div class="col-md-3">
    <label class="form-label fw-semibold">Date début</label>
    <input type="date" [(ngModel)]="searchDateDebut" class="form-control rounded-pill border-primary" />
  </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Type</label>
          <input type="text" [(ngModel)]="searchType" class="form-control rounded-pill border-primary" placeholder="Ex: Formation" />
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Statut</label>
          <select class="form-select rounded-pill border-primary" [(ngModel)]="searchStatut">
            <option value="">Tous</option>
            <option value="En attente">En attente</option>
            <option value="Acceptée">Acceptée</option>
            <option value="Refusée">Refusée</option>
          </select>
        </div>
      </div>
      <div class="mt-4 d-flex justify-content-end gap-3">
        <button class="btn btn-primary rounded-pill px-4" (click)="filtrer()">Rechercher</button>
        <button class="btn btn-outline-secondary rounded-pill px-4" (click)="resetRecherche()">Réinitialiser</button>
      </div>
    </div>
  </div>

  <!-- FORMULAIRE -->
  <form (ngSubmit)="addEmission()" class="card p-4 shadow-sm mb-5 rounded-4 border-0">
    <div class="row g-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold">Matricule employé</label>
        <input type="text" [(ngModel)]="newEmission.employe.matricule" name="matricule" (input)="remplirNomEtZone()" class="form-control rounded-pill border-primary" required />
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Nom</label>
        <input type="text" class="form-control" [value]="nomEmploye" disabled />
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Zone</label>
        <input type="text" class="form-control" [value]="zoneEmploye" disabled />
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Type d’émission</label>
        <select [(ngModel)]="newEmission.type" name="type" class="form-select rounded-pill border-primary" required>
          <option value="Voyage à l'étranger">Voyage à l'étranger</option>
          <option value="Formation">Formation</option>
          <option value="Client">Client</option>
          <option value="Fournisseur">Fournisseur</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="col-md-6" *ngIf="newEmission.type === 'Autre'">
        <label class="form-label fw-semibold">Précisez</label>
        <input type="text" [(ngModel)]="newEmission.autreType" name="autreType" class="form-control rounded-pill border-primary" required />
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Date début</label>
        <input type="date" [(ngModel)]="newEmission.dateDebut" name="dateDebut" class="form-control rounded-pill border-primary" required />
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Date fin</label>
        <input type="date" [(ngModel)]="newEmission.dateFin" name="dateFin" class="form-control rounded-pill border-primary" required />
      </div>
      <div class="col-12 text-center">
        <button type="submit" class="btn btn-primary px-5 rounded-pill shadow-sm mt-3">
  {{ isEditMode ? 'Mettre à jour' : 'Ajouter' }}
</button>
<div class="text-center" *ngIf="isEditMode">
  <button type="button" (click)="annulerModification()" class="btn btn-outline-secondary px-4 mt-2 rounded-pill">Annuler la modification</button>
</div>

      </div>
    </div>
  </form>

  <!-- TABLEAU -->
  <div class="card p-4 shadow-sm rounded-4 border-0">
    <h4 class="fw-bold mb-3">Liste des émissions</h4>
    <div class="table-responsive">
      <table class="table table-bordered table-striped text-center align-middle">
        <thead class="table-primary text-primary">
          <tr>
            <th class="col-xs">Matricule</th>
            <th class="col-md">Nom</th>
            <th class="col-md">Zone</th>
            <th class="col-md">Type</th>
            <th class="col-sm">Date début</th>
            <th class="col-sm">Date fin</th>
            <th class="col-md">Statut</th>
            <th class="col-xl col-actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of emissionsAffichees">
            <td>{{ e.employe?.matricule }}</td>
            <td>{{ e.employe?.fullname }}</td>
            <td>{{ e.employe?.zone }}</td>
            <td>{{ e.type }}</td>
            <td>{{ e.dateDebut }}</td>
            <td>{{ e.dateFin }}</td>
            <td>
              <span class="badge" [ngClass]="{
                'bg-warning text-dark': e.statut === 'En attente',
                'bg-success': e.statut === 'Acceptée',
                'bg-danger': e.statut === 'Refusée'
              }">{{ e.statut }}</span>
            </td>
            <td>
              <ng-container *ngIf="userRole?.toLowerCase() === 'responsable rh'">
                <button class="btn btn-success btn-sm me-1" (click)="changerStatut(e.id, 'Acceptée')"><i class="fa-solid fa-check me-1"></i> Accepter</button>
                <button class="btn btn-danger btn-sm me-1" (click)="changerStatut(e.id, 'Refusée')"><i class="fa-solid fa-xmark me-1"></i> Refuser</button>
              </ng-container>
              <button class="btn btn-outline-primary btn-sm me-1" (click)="modifier(e)"><i class="fa-solid fa-pen me-1"></i> Modifier</button>
              <button class="btn btn-outline-danger btn-sm" (click)="deleteEmission(e.id)"><i class="fa-solid fa-trash me-1"></i> Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
