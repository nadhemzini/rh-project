  <div class="container mt-5 mb-5">
  <h2 class="text-center text-primary mb-5 fw-bold">Gestion des Interrogatoire</h2>
 <div class="row mb-4">
    <div class="col-md-3">
      <input
        type="text"
        class="form-control"
        placeholder="🔎 Matricule"
        [(ngModel)]="searchMatricule"
        (ngModelChange)="applyFilter()"
      />
    </div>
    <div class="col-md-3">
      <input
        type="text"
        class="form-control"
        placeholder="📍 Zone"
        [(ngModel)]="searchZone"
        (ngModelChange)="applyFilter()"
      />
    </div>
    <div class="col-md-3">
      <input
        type="text"
        class="form-control"
        placeholder="📝 Sujet"
        [(ngModel)]="searchType"
        (ngModelChange)="applyFilter()"
      />
    </div>
    <div class="col-md-3 d-grid gap-2">
      <button class="btn btn-primary" (click)="applyFilter()">Rechercher</button>
      <button class="btn btn-outline-secondary" (click)="resetFilter()">Réinitialiser</button>
    </div>
  </div>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-4 border rounded shadow bg-light">
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Matricule</label>
      <input type="text" formControlName="matricule" class="form-control" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Nom de l'employé</label>
      <input type="text" class="form-control" [value]="nomEmploye" disabled>
    </div>

    <div class="col-md-4">
      <label class="form-label">Zone</label>
      <input type="text" class="form-control" [value]="zoneEmploye" disabled>
    </div>
  </div>

  <div class="row g-3 mt-2">
    <div class="col-md-4">
      <label class="form-label">Date de l’interrogatoire</label>
      <input type="date" formControlName="date" class="form-control" required>
    </div>

    <div class="col-md-8">
      <label class="form-label">Sujet de l’interrogatoire</label>
      <input type="text" formControlName="sujet" class="form-control" required>
    </div>
  </div>

  <div class="mt-3">
    <label class="form-label">Réponse de l’employé</label>
    <textarea formControlName="reponseEmploye" class="form-control" rows="3" required></textarea>
  </div>

  <div class="mt-3">
    <label class="form-label">Punition proposée</label>
    <select formControlName="punitionProposee" class="form-select" required>
      <option value="Avertissement verbal">Avertissement verbal</option>
      <option value="Avertissement écrit">Avertissement écrit</option>
      <option value="Réprimande">Réprimande</option>
      <option value="Suspension temporaire du travail">Suspension temporaire du travail</option>
      <option value="Saisine du conseil de discipline">Saisine du conseil de discipline</option>
    </select>
  </div>

  <div *ngIf="isSuspensionTemporaire()" class="mt-3 col-md-4 p-0">
    <label class="form-label">Nombre de jours de suspension</label>
    <input type="number" formControlName="nombreJours" class="form-control" min="1">
  </div>

  <div *ngIf="isConseilDiscipline()" class="row g-3 mt-3">
    <div class="col-md-4">
      <label class="form-label">Durée de suspension (en jours)</label>
      <input type="number" formControlName="nombreJours" class="form-control" min="1">
    </div>
    <div class="col-md-4">
      <label class="form-label">Date du conseil</label>
      <input type="date" formControlName="dateConseilDiscipline" class="form-control">
    </div>
  </div>

  <div class="mt-4">
    <button type="submit" class="btn btn-primary">
      {{ currentEditingId ? 'Modifier' : 'Enregistrer' }}
    </button>
    <button type="button" class="btn btn-secondary ms-2" (click)="resetForm()" *ngIf="currentEditingId">Annuler</button>
  </div>
</form>

<hr>
 <h3>Liste des interrogatoires</h3>
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th class="col-xs">Matricule</th>
          <th class="col-md">Employé</th>
          <th class="col-sm">Date</th>
          <th class="col-md">Sujet</th>
          <th class="col-md">Punition</th>
          <th class="col-md">Nombre Jours</th>
          <th class="col-xl" style="min-width:160px;" class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- on boucle sur filteredInterrogatoires -->
        <tr *ngFor="let i of filteredInterrogatoires">
          <td>{{ i.employe?.matricule }}</td>
          <td>{{ i.employe?.fullname }}</td>
          <td>{{ i.date | date:'shortDate' }}</td>
          <td>{{ i.sujet }}</td>
          <td>{{ i.punitionProposee }}</td>
         <td>
  <ng-container *ngIf="i.punitionProposee === 'Suspension temporaire du travail' || i.punitionProposee === 'Saisine du conseil de discipline'; else vide">
    {{ i.nombreJours || '' }}
  </ng-container>
  <ng-template #vide></ng-template>
</td>



          <td>
            <button class="btn btn-sm btn-primary me-1" (click)="editInterrogatoire(i)"><i class="fa-solid fa-pen me-1"></i> Modifier</button>
            <button class="btn btn-sm btn-danger me-1" (click)="deleteInterrogatoire(i.id)"><i class="fa-solid fa-trash me-1"></i> Supprimer</button>
            <button class="btn btn-sm btn-info" (click)="generatePdfFromInterrogatoire(i)"><i class="fa-solid fa-file-pdf me-1"></i> PDF</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
